services:
  yerbaxanaes-db:
    image: postgres:16-alpine
    container_name: yerbaxanaes_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Definí POSTGRES_PASSWORD en el .env de la raíz del repo}
      POSTGRES_DB: ${POSTGRES_DB:-yerbaxanaes_main_db}
    ports:
      - "5432:5432"
    volumes:
      - yerbaxanaes_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-yerbaxanaes_main_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  yerbaxanaes_pg_data:
