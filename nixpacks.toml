# nixpacks.toml — Configuración de build para Railway
# Railway usa nixpacks para detectar el runtime y buildear el proyecto.
# Este archivo le dice explícitamente que use Bun y cómo buildear la API de NestJS.

[variables]
NODE_ENV = "production"

[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = ["bun install --frozen-lockfile"]

[phases.build]
cmds = [
  "cd apps/api && bunx prisma generate",
  "cd apps/api && bun run build"
]

[start]
cmd = "cd apps/api && bunx prisma migrate deploy && node dist/main"
