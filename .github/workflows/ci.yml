# CI de YerbaXanaes — gates rápidos en cada PR y push a main.
# Monorepo Turborepo + Bun. Los E2E de Playwright (pesados, levantan Docker + servers)
# viven en e2e.yml para no frenar cada PR.
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Si llega un push nuevo al mismo ref, cancela la corrida en curso.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Type-check · Lint · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      # setup-bun cachea el toolchain, no las deps del proyecto: eso lo hace actions/cache.
      - name: Cache Bun + Turbo
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            .turbo
          key: ${{ runner.os }}-bun-turbo-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-turbo-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # El cliente Prisma no está versionado. Hay que generarlo antes del type-check:
      # api y backoffice importan tipos de @prisma/client (el build ya lo regenera vía prebuild).
      - name: Generate Prisma Client
        working-directory: apps/api
        run: bunx prisma generate

      - name: Type check
        run: bun run check-types

      # Lint NO bloqueante por ahora: hay deuda de lint preexistente (p. ej. 18 errores en
      # el API, + revisar ui/ecommerce/backoffice y el paquete set-proto). Reporta pero no
      # frena el merge. Promover a gate bloqueante (y quitar el `--fix` del script del API)
      # cuando se salde esa deuda, en una tarea aparte.
      - name: Lint (informativo)
        run: bun run lint
        continue-on-error: true

      - name: Build
        run: bun run build
        env:
          NODE_ENV: production

  test:
    name: API unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.8

      - name: Cache Bun
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma Client
        working-directory: apps/api
        run: bunx prisma generate

      # Jest unit (*.spec.ts): mockean PrismaService, no necesitan DB.
      - name: Unit tests (Jest)
        working-directory: apps/api
        run: bun run test
